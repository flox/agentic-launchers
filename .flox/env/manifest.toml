schema-version = "1.12.0"


[install]
codex.pkg-path = "flox/codex"
codex.pkg-group = "codex"
crush.pkg-path = "flox/crush"
crush.pkg-group = "crush"
gemini-cli.pkg-path = "flox/gemini-cli"
gemini-cli.pkg-group = "gemini-cli"
claude-code.pkg-path = "flox/claude-code"
claude-code.pkg-group = "claude-code"
opencode.pkg-path = "flox/opencode"
opencode.pkg-group = "opencode"
deepseek-tui.pkg-path = "flox/deepseek-tui"
deepseek-tui.pkg-group = "deepseek-tui"
aider-chat.pkg-path = "aider-chat"
hermes-agent.pkg-path = "flox/hermes-agent"
hermes-agent.pkg-group = "hermes-agent"
hermes-agent.priority = 3
llamacpp-proxy.pkg-path = "flox-labs/llamacpp-proxy"
llamacpp-proxy.pkg-group = "llamacpp-proxy"
bash.pkg-path = "bash"
jq.pkg-path = "jq"
gnused.pkg-path = "gnused"
gawk.pkg-path = "gawk"
git.pkg-path = "git"
gum.pkg-path = "gum"
flox-mcp-server.pkg-path = "flox/flox-mcp-server"
flox-mcp-server.pkg-group = "flox-mcp-server"
flox-mcp-server.systems = ["x86_64-linux", "aarch64-darwin"]
openclaw.pkg-path = "flox/openclaw"
openclaw.pkg-group = "openclaw"
nanocoder.pkg-path = "flox/nanocoder"
nanocoder.pkg-group = "nanocoder"
ollama-model-resolver.store-path = "/nix/store/8kxqskxzidwkb41nfvkbq6pi7c44an8r-ollama-model-resolver-0.4.2"
ollama-model-resolver.systems = ["x86_64-linux"]
ollama-cuda.pkg-path = "flox/ollama-cuda"
ollama-cuda.pkg-group = "ollama-cuda"
ollama-cuda.systems = ["x86_64-linux", "aarch64-linux"]

[vars]


[hook]
on-activate = '''
  export OLLAMA_CONTEXT_LENGTH="${OLLAMA_CONTEXT_LENGTH:-262144}"  # Default: 4096
  export OLLAMA_HOST="127.0.0.1"
  export OLLAMA_PORT="${OLLAMA_PORT:-11434}"
  export OPENAI_API_BASE="${OPENAI_API_BASE:-http://127.0.0.1:11434/v1}"
  export OPENAI_API_KEY="${OPENAI_API_KEY:-ollama}"
  export OMLX_HOST="${OMLX_HOST:-127.0.0.1}"
  export OMLX_PORT="${OMLX_PORT:-8000}"
  export LLAMACPP_PROXY_OLLAMA_LISTEN="${LLAMACPP_PROXY_OLLAMA_LISTEN:-127.0.0.1:8081}"
  export LLAMACPP_PROXY_GEMINI_OLLAMA_LISTEN="${LLAMACPP_PROXY_GEMINI_OLLAMA_LISTEN:-127.0.0.1:8082}"
  export LLAMACPP_PROXY_OMLX_LISTEN="${LLAMACPP_PROXY_OMLX_LISTEN:-127.0.0.1:8083}"
  export LLAMACPP_PROXY_GEMINI_OMLX_LISTEN="${LLAMACPP_PROXY_GEMINI_OMLX_LISTEN:-127.0.0.1:8084}"
'''


[profile]
common = '''
  export PATH="$FLOX_ENV_PROJECT/bin:$PATH"
'''


[services.llamacpp-proxy-ollama]
command = '''
  if [[ "$(uname -s)" == "Darwin" && "$(uname -m)" != "arm64" ]]; then
    echo "llamacpp-proxy not supported on Intel Mac" >&2; exit 1
  fi
  _ollama="${OLLAMA_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}"
  for _i in $(seq 1 30); do
    curl -sf --connect-timeout 2 --max-time 3 "http://${_ollama}/" >/dev/null 2>&1 && break
    sleep 1
  done
  if ! curl -sf --connect-timeout 3 --max-time 5 "http://${_ollama}/" >/dev/null 2>&1; then
    echo "ollama is not reachable at ${_ollama} after 30s — is it running?" >&2; exit 1
  fi
  model="$(cat "${FLOX_ENV_CACHE}/llamacpp-proxy-ollama.model" 2>/dev/null || true)"
  [[ -z "$model" ]] && model="default"
  exec llamacpp-proxy \
    --listen "${LLAMACPP_PROXY_OLLAMA_LISTEN:-127.0.0.1:8081}" \
    --backend "${OLLAMA_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}" \
    --backend-model "$model" \
    --gemini-listen "${LLAMACPP_PROXY_GEMINI_OLLAMA_LISTEN:-127.0.0.1:8082}"
'''

[services.llamacpp-proxy-omlx]
command = '''
  if [[ "$(uname -s)" == "Darwin" && "$(uname -m)" != "arm64" ]]; then
    echo "llamacpp-proxy not supported on Intel Mac" >&2; exit 1
  fi
  # Read key from omlx's own settings file (authoritative source)
  _api_key="$(jq -r '.auth.api_key // empty' "$HOME/.omlx/settings.json" 2>/dev/null || true)"
  if [[ -z "$_api_key" ]]; then
    echo "Error: omlx API key not found in ~/.omlx/settings.json — is omlx running?" >&2; exit 1
  fi
  model="$(cat "${FLOX_ENV_CACHE}/llamacpp-proxy-omlx.model" 2>/dev/null || true)"
  [[ -z "$model" ]] && model="default"
  exec llamacpp-proxy \
    --listen "${LLAMACPP_PROXY_OMLX_LISTEN:-127.0.0.1:8083}" \
    --backend "${OMLX_HOST:-127.0.0.1}:${OMLX_PORT:-8000}" \
    --backend-api-key "$_api_key" \
    --backend-model "$model" \
    --gemini-listen "${LLAMACPP_PROXY_GEMINI_OMLX_LISTEN:-127.0.0.1:8084}"
'''


[include]
environments = [
#  { remote = "flox-labs/omlx" },
  { remote = "flox-labs/ollama" },
]


[options]
systems = [
   "aarch64-darwin",
   "aarch64-linux",
   "x86_64-linux",
]
# Uncomment to disable CUDA detection.
# cuda-detection = false
