    "hook": {
      "on-activate": "# Publish the service's bind address (OMLX_HOST / OMLX_PORT) and admin key\n# (OMLX_API_KEY) so consumers and interactive shells can reach it.\n# Override any value at runtime by writing to:\n#   $FLOX_ENV_CACHE/omlx.host       e.g. \"0.0.0.0\"\n#   $FLOX_ENV_CACHE/omlx.port       e.g. \"9001\"\n#   $FLOX_ENV_CACHE/omlx.api-key    enables admin endpoints when set\nexport OMLX_HOST=\"$(cat \"$FLOX_ENV_CACHE/omlx.host\" 2>/dev/null || echo 127.0.0.1)\"\nexport OMLX_PORT=\"$(cat \"$FLOX_ENV_CACHE/omlx.port\" 2>/dev/null || echo 8000)\"\nexport OMLX_API_KEY=\"$(cat \"$FLOX_ENV_CACHE/omlx.api-key\" 2>/dev/null || true)\"\n\n# === MODEL STORAGE ===\n# Use Ollama's default location (~/.ollama/models) unless user overrides\n# To use project-local storage: OLLAMA_MODELS=$FLOX_ENV_CACHE/models flox activate\nexport OLLAMA_MODELS=\"${OLLAMA_MODELS:-$HOME/.ollama/models}\"\n\n# Create models directory if using custom location\nif [ \"$OLLAMA_MODELS\" = \"$FLOX_ENV_CACHE/models\" ]; then\n  mkdir -p \"$OLLAMA_MODELS\"\nfi\n\n# === SERVER CONFIGURATION ===\nexport OLLAMA_HOST=\"${OLLAMA_HOST:-127.0.0.1:11434}\"\nexport OLLAMA_ORIGINS=\"${OLLAMA_ORIGINS:-}\"  # Use Ollama defaults\n\n# === PERFORMANCE & MEMORY ===\nexport OLLAMA_CONTEXT_LENGTH=\"${OLLAMA_CONTEXT_LENGTH:-}\"  # Default: 4096\nexport OLLAMA_KEEP_ALIVE=\"${OLLAMA_KEEP_ALIVE:-}\"  # Default: 5m\nexport OLLAMA_MAX_LOADED_MODELS=\"${OLLAMA_MAX_LOADED_MODELS:-}\"  # Default: auto (3 * GPU count)\nexport OLLAMA_NUM_PARALLEL=\"${OLLAMA_NUM_PARALLEL:-}\"  # Default: 1\nexport OLLAMA_MAX_QUEUE=\"${OLLAMA_MAX_QUEUE:-}\"  # Default: 512\nexport OLLAMA_LOAD_TIMEOUT=\"${OLLAMA_LOAD_TIMEOUT:-}\"  # Default: 5m\n\n# === GPU CONFIGURATION ===\nexport OLLAMA_FLASH_ATTENTION=\"${OLLAMA_FLASH_ATTENTION:-}\"  # Experimental\nexport OLLAMA_KV_CACHE_TYPE=\"${OLLAMA_KV_CACHE_TYPE:-}\"  # Default: f16\nexport OLLAMA_GPU_OVERHEAD=\"${OLLAMA_GPU_OVERHEAD:-}\"  # Default: 0\n# Only set CUDA_VISIBLE_DEVICES if user explicitly provides it\nif [ -n \"${CUDA_VISIBLE_DEVICES+x}\" ]; then\n  export CUDA_VISIBLE_DEVICES\nfi\n\n# Detect GPU availability\nexport _FLOX_ENV_CUDA_DETECTION=0\nif command -v nvidia-smi >/dev/null 2>&1; then\n  if nvidia-smi -L 2>/dev/null | grep -q \"GPU\"; then\n    export _FLOX_ENV_CUDA_DETECTION=1\n  fi\nfi\n\n# === ADVANCED / EXPERIMENTAL ===\nexport OLLAMA_DEBUG=\"${OLLAMA_DEBUG:-0}\"  # 0 = disabled, 1 = enabled\nexport OLLAMA_SCHED_SPREAD=\"${OLLAMA_SCHED_SPREAD:-}\"  # Schedule across all GPUs\nexport OLLAMA_NOPRUNE=\"${OLLAMA_NOPRUNE:-}\"  # Don't prune model blobs\nexport OLLAMA_LLM_LIBRARY=\"${OLLAMA_LLM_LIBRARY:-}\"  # Bypass autodetection\nexport OLLAMA_AUTH=\"${OLLAMA_AUTH:-}\"  # Experimental authentication\n\n  if [[ -f \"$FLOX_ENV/etc/agentic-bootstrap.sh\" ]]; then\n    source \"$FLOX_ENV/etc/agentic-bootstrap.sh\"\n  elif [[ -n \"${FLOX_ENV_PROJECT:-}\" && -f \"$FLOX_ENV_PROJECT/etc/agentic-bootstrap.sh\" ]]; then\n    source \"$FLOX_ENV_PROJECT/etc/agentic-bootstrap.sh\"\n  fi\n"
    },
    "profile": {
      "common": "  export PATH=\"$FLOX_ENV_PROJECT/bin:$PATH\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    },
    "services": {
      "llamacpp-proxy-ollama": {
        "command": "  if [[ \"$(uname -s)\" == \"Darwin\" && \"$(uname -m)\" != \"arm64\" ]]; then\n    echo \"llamacpp-proxy not supported on Intel Mac\" >&2; exit 1\n  fi\n  _ollama=\"${OLLAMA_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}\"\n  for _i in $(seq 1 30); do\n    curl -sf --connect-timeout 2 --max-time 3 \"http://${_ollama}/\" >/dev/null 2>&1 && break\n    sleep 1\n  done\n  if ! curl -sf --connect-timeout 3 --max-time 5 \"http://${_ollama}/\" >/dev/null 2>&1; then\n    echo \"ollama is not reachable at ${_ollama} after 30s — is it running?\" >&2; exit 1\n  fi\n  model=\"$(cat \"${FLOX_ENV_CACHE}/llamacpp-proxy-ollama.model\" 2>/dev/null || true)\"\n  [[ -z \"$model\" ]] && model=\"default\"\n  exec llamacpp-proxy \\\n    --listen \"${LLAMACPP_PROXY_OLLAMA_LISTEN:-127.0.0.1:8081}\" \\\n    --backend \"${OLLAMA_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}\" \\\n    --backend-model \"$model\" \\\n    --gemini-listen \"${LLAMACPP_PROXY_GEMINI_OLLAMA_LISTEN:-127.0.0.1:8082}\"\n"
      },
      "llamacpp-proxy-omlx": {
        "command": "  if [[ \"$(uname -s)\" == \"Darwin\" && \"$(uname -m)\" != \"arm64\" ]]; then\n    echo \"llamacpp-proxy not supported on Intel Mac\" >&2; exit 1\n  fi\n  # Read key from omlx's own settings file (authoritative source)\n  _api_key=\"$(jq -r '.auth.api_key // empty' \"$HOME/.omlx/settings.json\" 2>/dev/null || true)\"\n  if [[ -z \"$_api_key\" ]]; then\n    echo \"Error: omlx API key not found in ~/.omlx/settings.json — is omlx running?\" >&2; exit 1\n  fi\n  model=\"$(cat \"${FLOX_ENV_CACHE}/llamacpp-proxy-omlx.model\" 2>/dev/null || true)\"\n  [[ -z \"$model\" ]] && model=\"default\"\n  exec llamacpp-proxy \\\n    --listen \"${LLAMACPP_PROXY_OMLX_LISTEN:-127.0.0.1:8083}\" \\\n    --backend \"${OMLX_HOST:-127.0.0.1}:${OMLX_PORT:-8000}\" \\\n    --backend-api-key \"$_api_key\" \\\n    --backend-model \"$model\" \\\n    --gemini-listen \"${LLAMACPP_PROXY_GEMINI_OMLX_LISTEN:-127.0.0.1:8084}\"\n"
      },
      "ollama": {
        "command": "if [ -x \"$FLOX_ENV/bin/omlx\" ]; then\n  echo \"omlx found at $FLOX_ENV/bin/omlx; skipping 'ollama serve' because omlx will manage Ollama.\" >&2\n  exit 0\nfi\n\nexec ollama serve\n"
      },
      "omlx": {
        "command": "host=\"$(cat \"$FLOX_ENV_CACHE/omlx.host\" 2>/dev/null || echo 127.0.0.1)\"\nport=\"$(cat \"$FLOX_ENV_CACHE/omlx.port\" 2>/dev/null || echo 8000)\"\nkey=\"$(cat \"$FLOX_ENV_CACHE/omlx.api-key\" 2>/dev/null || true)\"\nif [ -n \"$key\" ]; then\n  exec omlx serve --host \"$host\" --port \"$port\" --api-key \"$key\"\nelse\n  exec omlx serve --host \"$host\" --port \"$port\"\nfi\n"
      }
    }
  },
